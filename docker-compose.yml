version: '3.9'

services:
  # ── Production image ─────────────────────────────────────────────────────────
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-code-security-scanner:latest
    container_name: ai-code-security-scanner
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    environment:
      PORT: '${PORT:-3001}'
      NODE_ENV: production
      SERVER_API_KEY: '${SERVER_API_KEY:-}'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      GITHUB_TOKEN: '${GITHUB_TOKEN:-}'
      INTERNAL_API_TOKEN: '${INTERNAL_API_TOKEN:-}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:${PORT:-3001}/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Local development (hot-reload with source mounts) ────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: ai-code-security-scanner-dev
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    volumes:
      - ./src:/app/src:ro
      - ./web:/app/web:ro
    environment:
      PORT: '${PORT:-3001}'
      NODE_ENV: development
      SERVER_API_KEY: '${SERVER_API_KEY:-}'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      GITHUB_TOKEN: '${GITHUB_TOKEN:-}'
    command: npx ts-node src/server.ts
    profiles:
      - dev

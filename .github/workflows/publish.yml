name: Publish to npm

on:
  # Trigger on v* version tags pushed directly (e.g. git tag v1.0.0 && git push --tags)
  push:
    tags:
      - 'v*'
  # Also trigger when a GitHub Release is published via the UI
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload release assets
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:vitest

      - name: Generate CycloneDX SBOM
        # npm sbom --omit dev produces a CycloneDX JSON SBOM for production
        # dependencies only. Attaching it as a release asset makes the
        # supply-chain provenance auditable by downstream consumers.
        run: npm sbom --omit dev --sbom-format cyclonedx > sbom.cyclonedx.json

      - name: Upload SBOM as release asset
        # Only runs when the workflow was triggered by a published GitHub Release.
        # On tag-push triggers there is no release object to attach assets to.
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./sbom.cyclonedx.json
          asset_name: sbom.cyclonedx.json
          asset_content_type: application/json

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

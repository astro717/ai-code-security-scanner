name: Publish to npm

on:
  # Trigger on v* version tags pushed directly (e.g. git tag v1.0.0 && git push --tags)
  push:
    tags:
      - 'v*'
  # Also trigger when a GitHub Release is published via the UI
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:vitest

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  sbom:
    name: Generate and upload SBOMs
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --output-file sbom.cyclonedx.json

      - name: Generate SPDX SBOM
        run: npm sbom --sbom-format spdx --output-file sbom.spdx.json

      - name: Upload SBOMs as release assets
        # Only upload when triggered by a GitHub Release (has a release context)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.cyclonedx.json
            sbom.spdx.json

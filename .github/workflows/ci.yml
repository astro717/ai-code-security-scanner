name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run vitest suite
        run: npm run test:vitest

      - name: Run vitest with coverage (v8)
        run: npm run test:coverage

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Run security scan (SARIF)
        # Always produce the SARIF artifact even when findings exist (exit-code 0)
        run: node dist/cli.js . --format sarif --exit-code 0 --output results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: ai-code-security-scanner
        # Requires the repo to have GitHub Advanced Security enabled.
        # On public repos this is free; on private repos it requires GHAS.
        continue-on-error: true

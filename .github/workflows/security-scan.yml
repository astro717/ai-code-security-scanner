name: AI Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    name: Scan changed files for security issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build scanner
        run: npm run build

      - name: Get changed JS/TS files
        id: changed-files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only --diff-filter=ACM "$BASE" "$HEAD" \
            | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$CHANGED" | grep -c '\S' || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run security scan on changed files
        id: scan
        if: steps.changed-files.outputs.count != '0'
        run: |
          FINDINGS_JSON=$(mktemp)
          ALL_FINDINGS="[]"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            RESULT=$(node dist/cli.js "$file" --json --severity low 2>/dev/null || true)
            if [ -n "$RESULT" ]; then
              FILE_FINDINGS=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(json.dumps(data if isinstance(data, list) else data.get('findings', [])))
          " 2>/dev/null || echo "[]")
              ALL_FINDINGS=$(python3 -c "
          import json
          a = json.loads('$ALL_FINDINGS')
          b = json.loads('''$FILE_FINDINGS''')
          print(json.dumps(a + b))
          " 2>/dev/null || echo "$ALL_FINDINGS")
            fi
          done <<< "${{ steps.changed-files.outputs.files }}"

          echo "$ALL_FINDINGS" > "$FINDINGS_JSON"
          echo "findings_file=$FINDINGS_JSON" >> "$GITHUB_OUTPUT"

          HAS_CRITICAL=$(python3 -c "
          import json
          findings = json.load(open('$FINDINGS_JSON'))
          bad = [f for f in findings if f.get('severity') in ('critical', 'high')]
          print(len(bad))
          " 2>/dev/null || echo "0")

          echo "high_critical_count=$HAS_CRITICAL" >> "$GITHUB_OUTPUT"

          if [ "$HAS_CRITICAL" -gt 0 ]; then
            echo "High/critical findings detected — failing check."
            exit 1
          fi

      - name: Post findings summary as PR comment
        if: always() && steps.changed-files.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          FINDINGS_FILE: ${{ steps.scan.outputs.findings_file }}
          HIGH_CRITICAL_COUNT: ${{ steps.scan.outputs.high_critical_count }}
          CHANGED_COUNT: ${{ steps.changed-files.outputs.count }}
        with:
          script: |
            const fs = require('fs');
            let findings = [];
            try {
              findings = JSON.parse(fs.readFileSync(process.env.FINDINGS_FILE, 'utf8'));
            } catch (_) {}

            const highCriticalCount = parseInt(process.env.HIGH_CRITICAL_COUNT || '0', 10);
            const changedCount = parseInt(process.env.CHANGED_COUNT || '0', 10);
            const order = { critical: 0, high: 1, medium: 2, low: 3 };

            const sorted = [...findings].sort(
              (a, b) => (order[a.severity] ?? 3) - (order[b.severity] ?? 3)
            );

            const bySeverity = { critical: 0, high: 0, medium: 0, low: 0 };
            for (const f of findings) bySeverity[f.severity] = (bySeverity[f.severity] ?? 0) + 1;

            const statusIcon = highCriticalCount > 0 ? '🔴' : findings.length > 0 ? '🟡' : '🟢';
            const statusText = highCriticalCount > 0
              ? `**${highCriticalCount} high/critical finding(s) detected — check failed**`
              : findings.length > 0
                ? `${findings.length} low/medium finding(s) found — check passed`
                : 'No security findings — check passed';

            const severityRows = Object.entries(bySeverity)
              .filter(([, n]) => n > 0)
              .map(([sev, n]) => `| ${sev.toUpperCase()} | ${n} |`)
              .join('\n');

            const detailRows = sorted
              .map((f) => `| ${f.severity.toUpperCase()} | \`${f.type}\` | \`${f.file ?? 'unknown'}\` | ${f.line} | ${(f.message ?? '').slice(0, 120)} |`)
              .join('\n');

            const body = [
              `## ${statusIcon} AI Security Scan Results`,
              '',
              `Scanned **${changedCount}** changed JS/TS file(s).  ${statusText}`,
              '',
              findings.length > 0 ? '### Summary by Severity' : '',
              findings.length > 0 ? '| Severity | Count |' : '',
              findings.length > 0 ? '|----------|-------|' : '',
              severityRows,
              '',
              findings.length > 0 ? '### All Findings' : '',
              findings.length > 0 ? '| Severity | Type | File | Line | Message |' : '',
              findings.length > 0 ? '|----------|------|------|------|---------|' : '',
              detailRows,
              '',
              '_Generated by [ai-code-security-scanner](https://github.com)_',
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes('AI Security Scan Results')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Generate SARIF report
        if: always() && steps.changed-files.outputs.count != '0'
        run: |
          SARIF_FILE="results.sarif"
          # Scan all changed files and merge findings into a single SARIF report.
          # We use the CLI's --sarif flag on a temp file that collects all changed code.
          ALL_FINDINGS_JSON=$(cat "${{ steps.scan.outputs.findings_file }}" 2>/dev/null || echo "[]")
          # Generate SARIF from the findings using a Node one-liner with the existing buildSARIF function
          node -e "
            const { buildSARIF } = require('./dist/scanner/sarif');
            const findings = JSON.parse(process.argv[1]);
            console.log(JSON.stringify(buildSARIF(findings), null, 2));
          " "$ALL_FINDINGS_JSON" > "$SARIF_FILE"
          echo "sarif_file=$SARIF_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && steps.changed-files.outputs.count != '0'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ai-code-security-scanner

      - name: No supported files changed
        if: steps.changed-files.outputs.count == '0'
        run: echo "No JS/TS files changed in this PR — skipping scan."
